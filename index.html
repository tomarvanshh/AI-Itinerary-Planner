<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Itinerary Planner MVP</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'primary-blue': '#1D4ED8',
                        'secondary-gray': '#F3F4F6',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800 p-4 sm:p-8 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-primary-blue mb-2">
                AI Travel Planner Demo
            </h1>
            <p class="text-gray-600 text-lg">
                Your B.Tech Project MVP: Structured Itinerary Generation using Generative AI.
            </p>
        </header>

        <!-- Input Form Card -->
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-2xl mb-8 border border-primary-blue/20">
            <h2 class="text-2xl font-bold mb-6 text-gray-700">Plan Your Trip</h2>
            <form id="itineraryForm" class="space-y-4">

                <!-- Destination & Days -->
                <div class="grid sm:grid-cols-2 gap-4">
                    <div>
                        <label for="destination" class="block text-sm font-medium text-gray-700">Destination City (e.g.,
                            Paris, Tokyo)</label>
                        <input type="text" id="destination" name="destination" required
                            class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-primary-blue focus:ring-primary-blue transition duration-150"
                            placeholder="Enter city name">
                    </div>
                    <div>
                        <label for="days" class="block text-sm font-medium text-gray-700">Number of Days</label>
                        <input type="number" id="days" name="days" required min="1" max="14" value="5"
                            class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-primary-blue focus:ring-primary-blue transition duration-150">
                    </div>
                </div>

                <!-- Budget & Preferences -->
                <div class="grid sm:grid-cols-2 gap-4">
                    <div>
                        <label for="budget" class="block text-sm font-medium text-gray-700">Budget Level</label>
                        <select id="budget" name="budget" required
                            class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-primary-blue focus:ring-primary-blue transition duration-150 bg-white">
                            <option value="Low (Hostels, Street Food, Public Transport)">Low (Hostels & Budget)</option>
                            <option value="Medium (3-Star Hotels, Mix of Dining)">Medium (Comfort & Balance)</option>
                            <option value="High (Luxury Hotels, Fine Dining, Private Tours)">High (Luxury & Exclusive)
                            </option>
                        </select>
                    </div>
                    <div>
                        <label for="preferences" class="block text-sm font-medium text-gray-700">General
                            Preferences</label>
                        <input type="text" id="preferences" name="preferences" required
                            class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-primary-blue focus:ring-primary-blue transition duration-150"
                            placeholder="e.g., Museums, Nightlife, Relaxing Beach">
                    </div>
                </div>

                <button type="submit" id="generateButton"
                    class="w-full py-3 mt-4 text-white font-semibold rounded-lg shadow-lg bg-primary-blue hover:bg-blue-700 transition duration-300 focus:outline-none focus:ring-4 focus:ring-blue-300 disabled:bg-gray-400">
                    Generate Itinerary
                </button>
            </form>
        </div>

        <!-- Output Display Area -->
        <div id="outputContainer" class="hidden">
            <h2 class="text-3xl font-bold text-gray-700 mb-6 border-b pb-2">Generated Itinerary</h2>

            <!-- Loading State -->
            <div id="loading" class="hidden text-center p-12 bg-white rounded-xl shadow-md">
                <svg class="animate-spin h-8 w-8 text-primary-blue mx-auto mb-4" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <p class="text-lg text-gray-600">The AI is crafting your personalized, detailed trip plan...</p>
                <p class="text-sm text-gray-500 mt-2">This may take a moment as we query real-time data for
                    recommendations.</p>
            </div>

            <!-- Summary Card -->
            <div id="summaryCard" class="bg-primary-blue text-white p-6 rounded-xl shadow-lg mb-6 hidden">
                <h3 class="text-xl font-semibold mb-2">Trip Overview</h3>
                <p id="summaryText" class="mb-4"></p>
                <p id="budgetText" class="font-bold text-lg border-t border-blue-400 pt-2"></p>
            </div>

            <!-- Daily Plan Area -->
            <div id="dailyPlanContainer" class="space-y-8">
                <!-- Daily cards will be rendered here -->
            </div>

            <!-- Error Message -->
            <div id="errorBox"
                class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl relative mt-6"
                role="alert">
                <strong class="font-bold">Error!</strong>
                <span class="block sm:inline" id="errorMessage"></span>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
    <script>
        // Load configuration after script.js is loaded
        loadConfig();
    </script>
</body>

</html>
